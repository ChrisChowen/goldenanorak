name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get repo name
        id: repo
        run: echo "name=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)" >> $GITHUB_OUTPUT

      - name: Build Astro site
        run: npx astro build --config astro.config.mjs
        env:
          ASTRO_BASE: /${{ steps.repo.outputs.name }}/current

      - name: Assemble pages output
        run: |
          mkdir -p _site

          # Current (Astro) site → /current/
          cp -r dist/ _site/current/

          # New (frontend-design) site → /new/
          mkdir -p _site/new
          cp frontend-design/*.html _site/new/
          cp frontend-design/*.css _site/new/
          # Copy actual images (resolve symlink)
          cp -rL frontend-design/images _site/new/images

          # Shared images at root (Astro uses absolute /images/ paths)
          cp -rL public/images _site/images

          # Landing page at root
          cp _site-landing.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
